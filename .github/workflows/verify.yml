name: verify

on:
  push:
  pull_request:

jobs:
  verify-public-track-record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify public repo guardrails
        run: python3 scripts/verify_public_repo.py .
